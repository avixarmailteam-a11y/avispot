<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotoğraflar - Mağazamız ve Ürünlerimiz | Aygül Spot</title>
    <meta name="description" content="Aygül Spot Kayseri ikinci el eşya mağazamızdan kareler, güncel satılık eşyalarımızdan görüntüler.">
    <meta name="keywords" content="kayseri spot eşya fotoğrafları, ikinci el eşya galerisi, aygül spot mağaza">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Aygül Spot",
        "description": "Kayseri'de değerinde nakit ikinci el eşya, mobilya ve beyaz eşya alım satımı yapan güvenilir spot mağazası.",
        "url": "https://aygulspot.com",
        "telephone": "+905393190959",
        "priceRange": "₺₺",
        "address": {
            "@type": "PostalAddress",
            "streetAddress": "Tacettin Veli Mah. Deliklitaş Cd. No:29/C",
            "addressLocality": "Melikgazi",
            "addressRegion": "Kayseri",
            "postalCode": "38030",
            "addressCountry": "TR"
        },
        "geo": {
            "@type": "GeoCoordinates",
            "latitude": 38.7312,
            "longitude": 35.4784
        },
        "openingHours": "Mo-Sa 09:00-19:00",
        "image": "https://aygulspot.com/img/logo.png"
    }</script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "İkinci el eşyalarımı nasıl satabilirim?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Eşyalarınızın fotoğraflarını WhatsApp hattımıza (0539 319 09 59) göndererek anında ücretsiz fiyat teklifi alabilirsiniz."
        }
      }, {
        "@type": "Question",
        "name": "Eşya taşıma (nakliye) ücretli mi?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Hayır, Kayseri il sınırları içerisindeki tüm alım ve satımlarımızda nakliye hizmetimiz tamamen ücretsizdir."
        }
      }]
    }</script>
</head>
<body>
    <main id="main-content">
    <!-- PAGE HERO -->
    <section class="page-hero">
        <h1>Fotoğraf Galerisi</h1>
        <p>Mağazamızdan kareler ve teslimatı yapılmış ürünlerimiz.</p>
        <div class="breadcrumb">
            <a href="/">Ana Sayfa</a>
            <span>/</span>
            <a href="/galeri.html">Fotoğraflar</a>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div id="loading" class="loading-spinner" style="display:none;"></div>
            
            <div class="gallery-grid stagger" id="gallery-grid">
                <!-- Data fetched via JS -->
            </div>

            <!-- Empty State -->
            <div id="no-photos" class="empty-state" style="display:none;">
                <div class="empty-state-icon">📷</div>
                <h3>Henüz fotoğraf eklenmemiş</h3>
                <p>Mağaza fotoğraflarımız yakında yüklenecektir.</p>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <img src="" alt="Gallery Image" id="lightbox-img">
    </div>

        </main>
    <script src="/js/main.js" defer></script>
    <script src="/js/gallery.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotoğraf Galerisi | Aygül Spot — Kayseri İkinci El Eşya</title>
    <meta name="description" content="Aygül Spot mağazamızdan görünümler ve referans ikinci el eşya fotoğraflarımız. Kayseri spot mağaza galerisi.">
    <meta name="keywords" content="kayseri spot eşya fotoğrafları, ikinci el eşya galerisi, aygül spot mağaza">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- PAGE HERO -->
    <section class="page-hero">
        <h1>Fotoğraf Galerisi</h1>
        <p>Mağazamızdan kareler ve teslimatı yapılmış ürünlerimiz.</p>
        <div class="breadcrumb">
            <a href="/">Ana Sayfa</a>
            <span>/</span>
            <a href="/galeri.html">Fotoğraflar</a>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div id="loading" class="loading-spinner" style="display:none;"></div>
            
            <div class="gallery-grid stagger" id="gallery-grid">
                <!-- Data fetched via JS -->
            </div>

            <!-- Empty State -->
            <div id="no-photos" class="empty-state" style="display:none;">
                <div class="empty-state-icon">📷</div>
                <h3>Henüz fotoğraf eklenmemiş</h3>
                <p>Mağaza fotoğraflarımız yakında yüklenecektir.</p>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <img src="" alt="Gallery Image" id="lightbox-img">
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/gallery.js"></script>
</body>
</html>
